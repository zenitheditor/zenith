name: Release
run-name: Release ${{ github.ref_name }}

# Tag-driven release. Push a tag `vX.Y.Z` (or a prerelease `vX.Y.Z-label.N`)
# whose base version matches `[workspace.package] version` in Cargo.toml. One
# synced version drives the crates.io publish and the GitHub Release binaries.
#
# Required configuration before the first real release:
#   - bump `[workspace.package] version` in Cargo.toml off `0.0.0`
#   - add a `CARGO_REGISTRY_TOKEN` secret (Environment: crates.io)
on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate tag against workspace version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "zenith-tool") | .version')

          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag '$TAG'. Expected vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi
          TAG_BASE="${BASH_REMATCH[1]}"
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oP '^\d+\.\d+\.\d+')
          if [[ "$TAG_BASE" != "$CARGO_BASE" ]]; then
            echo "::error::Tag base '$TAG_BASE' != Cargo.toml version '$CARGO_BASE'"
            exit 1
          fi

          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  ci:
    name: CI gate
    needs: validate-version
    uses: ./.github/workflows/test.yml

  publish-crates:
    name: Publish to crates.io
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Stamp version
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          # Workspace package version (first top-level `version = "..."`).
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          # Exact-pin internal dependency requirements so every version scheme
          # (including prereleases like 0.1.0-beta.1) resolves to this release.
          sed -i -E \
            "s/(^zenith-[a-z0-9-]+ = \{ version = )\"[^\"]*\"/\1\"=$VERSION\"/" \
            Cargo.toml
          echo "Stamped workspace + internal deps to $VERSION"
      # Publish in dependency order. Each tier waits until crates.io indexes the
      # new versions before the next tier (which depends on them) publishes.
      #   Tier 1: zenith-core, zenith-session  (no internal deps)
      #   Tier 2: zenith-layout                (-> core)
      #   Tier 3: zenith-scene                 (-> core, layout)
      #   Tier 4: zenith-render, zenith-tx     (-> core, scene)
      #   Tier 5: zenith-tool (zenith-cli)     (-> all)
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          is_published() {
            curl -sf -H "User-Agent: zenith-ci (github.com/zenitheditor/zenith)" \
              "https://crates.io/api/v1/crates/$1/$2" > /dev/null 2>&1
          }

          wait_for() {
            local crate="$1" version="$2"
            echo -n "  Waiting for $crate@$version..."
            for _ in $(seq 1 30); do
              if is_published "$crate" "$version"; then
                echo " ready"
                return 0
              fi
              sleep 5
            done
            echo " timed out!"
            return 1
          }

          publish_tier() {
            local tier_name="$1"; shift
            local crates=("$@")
            local need_wait=()

            echo "::group::Tier: $tier_name"
            for crate in "${crates[@]}"; do
              VERSION=$(cargo metadata --no-deps --format-version=1 \
                | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
              if is_published "$crate" "$VERSION"; then
                echo "  $crate@$VERSION already published — skipping"
              else
                echo "  Publishing $crate@$VERSION..."
                cargo publish -p "$crate" --allow-dirty --no-verify
                need_wait+=("$crate:$VERSION")
              fi
            done

            for entry in "${need_wait[@]}"; do
              wait_for "${entry%%:*}" "${entry##*:}"
            done
            echo "::endgroup::"
          }

          publish_tier "1 (core, session)"  zenith-core zenith-session
          publish_tier "2 (layout)"         zenith-layout
          publish_tier "3 (scene)"          zenith-scene
          publish_tier "4 (render, tx)"     zenith-render zenith-tx
          publish_tier "5 (cli)"            zenith-tool

  build-binaries:
    name: Build (${{ matrix.label }})
    needs: validate-version
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-arm64
            cross: true
          - runs-on: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - runs-on: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.target }}
      - name: Stamp version
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          # perl for a cross-platform in-place edit of the first version line.
          perl -i -pe "if (!\$done && /^version = \"/) { s/^version = \".*\"/version = \"$VERSION\"/; \$done=1 }" Cargo.toml
          # Exact-pin internal dependency requirements so prerelease versions
          # such as 0.1.0-beta.1 satisfy Cargo's path dependency version check.
          perl -i -pe "s/(^zenith-[a-z0-9-]+ = \\{ version = )\"[^\"]*\"/\$1\"=$VERSION\"/" Cargo.toml
      - name: Build zenith binary
        run: cargo build -p zenith-tool --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x zenith
          tar czf zenith-${{ needs.validate-version.outputs.version }}-${{ matrix.label }}.tar.gz zenith
          ls -lh zenith-*.tar.gz
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          $version = "${{ needs.validate-version.outputs.version }}"
          $label = "${{ matrix.label }}"
          Compress-Archive -Path zenith.exe -DestinationPath "zenith-$version-$label.zip"
          ls zenith-*.zip
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/zenith-*.tar.gz
            target/${{ matrix.target }}/release/zenith-*.zip
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: [validate-version, build-binaries, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Zenith ${{ needs.validate-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.validate-version.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          fail_on_unmatched_files: true
